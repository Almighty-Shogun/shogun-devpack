# AI Settings
settings.ai-terminal.description=Configure AI terminal integrations below.
settings.ai.restart-notice=Restart the IDE after enabling or disabling this AI tool window.
settings.ai.claude.additional-arguments=Additional Claude arguments
settings.ai.claude.additional-arguments.description=Extra arguments appended when starting Claude for this project, for example "--model sonnet --no-chrome". Invalid arguments can prevent Claude from starting.
settings.ai.claude.allow-project-work=Allow project-local edits without extra approval
settings.ai.claude.allow-project-work.description=Starts Claude with "--permission-mode acceptEdits" so file edits are accepted automatically while Claude Code still controls its own permission model.
settings.ai.claude.enabled=Enable claude
settings.ai.claude.enabled.description=Shows the Claude tool window and allows the Claude terminal command to be started from the IDE.
settings.ai.claude.path=Claude executable path
settings.ai.claude.path.browse-description=Choose the Claude executable that should be started in the AI tool window.
settings.ai.claude.path.browse-title=Select Claude executable
settings.ai.claude.path.description=Leave empty to run the default claude command from PATH. Set a custom path to override the default command.
settings.ai.claude.resume-project-session=Continue latest project session
settings.ai.claude.resume-project-session.description=Starts Claude with "claude --continue" so it continues the latest session for this project directory. Disable this to always start a fresh Claude session. Changes apply the next time a Claude session is started after closing the current one.
settings.ai.codex.additional-arguments=Additional Codex arguments
settings.ai.codex.additional-arguments.description=Extra arguments appended when starting Codex for this project, for example "--model gpt-5.5 --search". Invalid arguments can prevent Codex from starting.
settings.ai.codex.allow-project-work=Allow project-local work without extra approval
settings.ai.codex.allow-project-work.description=Starts Codex with "--sandbox workspace-write --ask-for-approval on-request" so normal work inside this project can proceed while out-of-project actions still require approval.
settings.ai.codex.enabled=Enable codex
settings.ai.codex.enabled.description=Shows the Codex tool window and allows the Codex terminal command to be started from the IDE.
settings.ai.codex.path=Codex executable path
settings.ai.codex.path.browse-description=Choose the Codex executable that should be started in the AI tool window.
settings.ai.codex.path.browse-title=Select Codex executable
settings.ai.codex.path.description=Leave empty to run the default codex command from PATH. Set a custom path to override the default command.
settings.ai.codex.resume-project-session=Resume latest project session
settings.ai.codex.resume-project-session.description=Starts Codex with "codex resume --last" so it continues the latest session for this project directory. Disable this to always start a fresh Codex session. Changes apply the next time a Codex session is started after closing the current one.

# Code Share Settings
settings.code-share.description=Uploads selected editor code or selected files to the configured uploader. Returned URLs are copied to the clipboard after a successful upload.
settings.code-share.uploader=Default uploader
settings.code-share.uploader.description=Choose which uploader is used when uploading code snippets or files. API keys and uploader options are configured on the uploader pages below Code Share.
settings.code-share.pastebin.developer-key=Pastebin developer key
settings.code-share.pastebin.developer-key.description=Required API developer key from Pastebin. The key is stored in the IDE credential store.
settings.code-share.pastebin.user-key=Pastebin user key
settings.code-share.pastebin.user-key.description=Optional account user key. This is required when Pastebin visibility is set to private.
settings.code-share.pastebin.visibility=Pastebin visibility
settings.code-share.pastebin.visibility.description=Controls the visibility mode sent to Pastebin when it is the selected uploader.
settings.code-share.github.public=Create public gists
settings.code-share.github.public.description=Leave disabled to create private or secret gists by default.
settings.code-share.github.token=GitHub token
settings.code-share.github.token.description=Token used to create gists through the GitHub API. Leave empty to use GH_TOKEN, GITHUB_TOKEN, or "gh auth token" when available to the IDE process. The configured token is stored in the IDE credential store.
settings.code-share.github.token.notice=If "gh auth token" works in your terminal but upload still fails, the IDE probably cannot see the same shell environment or GitHub CLI installation. In that case, paste the token here.
settings.code-share.custom-server.body=Request body
settings.code-share.custom-server.body.description=Optional multipart text fields sent together with the uploaded code file.
